<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    h3 { margin: 0 0 12px 0; color: #333; }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .status.connected { background: #d4edda; color: #155724; }
    .status.disconnected { background: #f8d7da; color: #721c24; }
    .tab-info {
      padding: 6px 0;
      font-size: 12px;
      color: #555;
    }
    .info {
      margin-top: 12px;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
  <h3>灵雀 Browser Relay</h3>
  <div id="status" class="status disconnected">检查中...</div>
  <div id="tabInfo" class="tab-info"></div>
  <div class="info">服务器: ws://127.0.0.1:50518/ws</div>
  <script src="popup.js"></script>
</body>
</html>
